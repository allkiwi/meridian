services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: meridian
      POSTGRES_PASSWORD: meridian
      POSTGRES_DB: meridian
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - meridian

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - meridian

  api:
    build:
      context: ../apps/api
      dockerfile: ../../infra/Dockerfile.api
    restart: unless-stopped
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://meridian:meridian@db:5432/meridian
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ../apps/api:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    networks:
      - meridian
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  web:
    image: node:22-alpine
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ../apps/web:/app
      - web_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    networks:
      - meridian
    command: sh -c "npm install && npm run dev -- --host"

volumes:
  postgres_data:
  web_node_modules:

networks:
  meridian:
    driver: bridge
